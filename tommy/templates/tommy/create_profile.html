{% extends "base_menu.html" %}

{% block header %}
    <div class="p-3 mb-4 bg-light border rounded-3">
        <div class="container-fluid py-1">
            <h1 class="display-4 text-muted">Set up a learning profile</h1>
        </div>
    </div>
{% endblock header %}

{% block content %}
<div class="main p-1 m-3 bg-light rounded-3 shadow">
    <div class="container-fluid p-3">
        {% load crispy_forms_tags %}
        <form action="" method="post" id="upload_form" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form|crispy }}
            <input type="submit" value="Submit" class="btn btn-lg btn-outline-success me-3">
            {% block inner_content %}{% endblock inner_content %}
        </form>
    </div>
</div>
{% endblock content %}
